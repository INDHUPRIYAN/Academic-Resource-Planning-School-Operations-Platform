services:
  - type: web
    name: avinashi-gghss
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    plan: free # Change this to 'starter' (paid plan) on the Render dashboard to prevent it from going to sleep.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.10.9
      - key: PYTHONPATH
        value: backend
      - key: DATABASE_URL
        fromDatabase:
          name: avinashi-gghss-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render will automatically generate a secure 256-bit secret key.
      - key: CORS_ORIGINS
        value: https://avinashi-gghss.onrender.com
      - key: GROQ_API_KEY
        sync: false # Put your Groq API Key here in the Render dashboard.
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"

databases:
  - name: avinashi-gghss-db
    plan: free # Change this to 'starter' (paid plan) on the Render dashboard for production databases.
