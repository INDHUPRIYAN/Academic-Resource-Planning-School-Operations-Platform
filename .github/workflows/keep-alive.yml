# Keeps the Render free-tier instance warm.
#
# Render's free plan spins a service down after ~15 minutes with no traffic, and the
# next visitor then waits ~30-60s for a cold start (the "loading" page). Pinging the
# service on a schedule keeps it awake so real users never hit that.
#
# This hits /health, which is deliberately dependency-free (no database), so the ping
# is cheap and cannot be affected by the database being briefly unavailable.
#
# NOTE: the free plan includes 750 instance-hours/month and a month is ~730 hours, so
# keeping ONE service awake fits - but it leaves little headroom. The permanent fix is
# the paid Starter plan, which never sleeps.
name: Keep Render service awake

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (under Render's ~15 min idle cutoff)
  workflow_dispatch:          # allows a manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://avinashi-gghss.onrender.com/health"
          # Retry: the very first ping after a sleep may itself be the cold start.
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Service is awake."
              exit 0
            fi
            sleep 20
          done
          echo "::warning::Service did not return 200 after 3 attempts (last: $code)"
