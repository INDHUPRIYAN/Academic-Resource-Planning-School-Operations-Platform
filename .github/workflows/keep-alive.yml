# Keeps the Render free-tier instance warm.  ***BACKUP ONLY — NOT THE PRIMARY FIX.***
#
# Render's free plan spins a service down after ~15 minutes without inbound traffic,
# and the next visitor waits ~30-60s for the cold start (the "loading" page).
#
# IMPORTANT — why this file alone is NOT enough:
#   GitHub does not guarantee cron timing. Scheduled workflows are deprioritised under
#   load and are routinely delayed 15-60 minutes, sometimes skipped entirely. Since
#   Render sleeps at ~15 minutes, a delayed run arrives too late and the service has
#   already gone to sleep. Measured on this repo: pushed 12:13, still ZERO runs 53
#   minutes later.
#
#   => The PRIMARY keep-alive must be an external uptime pinger on a 1-5 minute
#      interval (cron-job.org, UptimeRobot, ...). See docs/KEEP_ALIVE.md.
#      This workflow is kept only as a cheap second layer.
#
# It pings /health, which is deliberately dependency-free (no database), so the ping is
# cheap and cannot fail just because the database is briefly unavailable.
#
# Free-plan note: 750 instance-hours/month vs ~730 hours in a month, so keeping ONE
# service awake fits, with little headroom. The permanent fix is the paid Starter plan.
name: Keep Render service awake

on:
  schedule:
    # 5 minutes is GitHub's minimum granularity. Actual firing is best-effort only.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}       # manual run from the Actions tab

# If GitHub fires several late runs at once, don't queue a backlog of pings.
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://avinashi-gghss.onrender.com/health"
          # The first ping after a sleep IS the cold start, so allow generous time and
          # retry - waking the service is the entire point of this job.
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 120 "$URL" || echo "000")
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Service is awake."
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Service did not return 200 after 3 attempts (last: $code)"
